---
# Installation layout on managed hosts
cognitify_install_dir: /opt/cognitify

# How to place sources on the host: "git" or "copy"
# - git: clone cognitify_git_repo into cognitify_install_dir
# - copy: rsync-style copy from the Ansible controller (playbook machine)
cognitify_deploy_method: git

# --- git ---
cognitify_git_repo: "https://github.com/your-org/cognitify.git"
cognitify_git_version: HEAD
cognitify_git_force: false

# --- copy (deploy_method: copy) ---
# Absolute path on the controller to the cognitify repository root (contains configure, Makefile).
cognitify_controller_source: ""

# Optional: install common build tools before configure (make, and git when using git deploy)
cognitify_install_prereq_packages: true

# Per OS family package names for prerequisites (override in playbook if needed)
cognitify_prereq_packages_by_family:
  Debian:
    - make
  RedHat:
    - make
  Suse:
    - make
  Archlinux:
    - make

cognitify_git_prereq_packages_by_family:
  Debian:
    - git
  RedHat:
    - git
  Suse:
    - git
  Archlinux:
    - git

# configure / install options (see ./configure --help in the cognitify repo)
cognitify_prefix: /usr/local
cognitify_etc_dir: /etc
cognitify_install_user: "{{ ansible_user | default(ansible_user_id | default('root')) }}"

# When true, passes --skip-packages (no distro package installs from post-install)
cognitify_skip_packages: false

# host | docker | gui — ignored when cognitify_skip_packages is true
cognitify_package_target: host

cognitify_include_cockpit: false
cognitify_extended_completions: false
cognitify_extended_home_files: false

# Optional colour defaults (empty = omit flag)
cognitify_hostname_colour: ""
cognitify_username_colour: ""
cognitify_pwd_colour: ""

# Extra raw flags appended after built-in options (list of strings), e.g. ["--colour-profile=random"]
cognitify_extra_configure_args: []

# make targets (defaults match project Makefile)
cognitify_make_build_target: all
cognitify_make_install_target: install
