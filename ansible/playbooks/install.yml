---
# Example playbook: install Cognitify from this repository layout.
# Typical run (from the ansible/ directory):
#   ansible-playbook -i inventory/your-hosts.ini playbooks/install.yml
#
# Override variables with -e or a vars file, for example:
#   ansible-playbook ... -e cognitify_package_target=gui -e cognitify_include_cockpit=true

- name: Install Cognitify
  hosts: cognitify
  become: true
  roles:
    - role: cognitify
